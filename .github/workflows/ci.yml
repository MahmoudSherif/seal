name: tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: pytest -q

      - name: Smoke-test the CLI
        shell: bash
        run: |
          echo "hello" > sample.txt
          echo "p4ssw0rd" | seal encrypt sample.txt -P -q
          rm sample.txt
          echo "p4ssw0rd" | seal decrypt sample.txt.seal -P -q
          test "$(cat sample.txt)" = "hello"
          seal info sample.txt.seal
